services:
  minecraft:
    build:
      context: ./minecraft
      dockerfile: Dockerfile.minecraft
    volumes:
      - ./mc-data/world:/server/world
      - ./mc-data/logs:/server/logs
      - ./backups:/backups
      - ./mc-data/ops.json:/server/ops.json
    networks:
      mc-internal:
        ipv4_address: 10.89.1.2
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    restart: unless-stopped

  playit:
    build:
      context: ./playit
      dockerfile: Dockerfile.playit
    environment:
      SECRET_KEY: ${PLAYIT_SECRET_KEY}
    networks:
      - mc-internal
      - mc-external
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    read_only: true
    tmpfs:
      - /tmp
      - /home/playit/.config/playit_gg
    restart: unless-stopped
    depends_on:
      - minecraft

networks:
  mc-internal:
    internal: true
    ipam:
      config:
        - subnet: 10.89.1.0/24
  mc-external:
    driver: bridge
